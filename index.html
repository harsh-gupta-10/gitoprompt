<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme detection (prevents flash of wrong theme) -->
    <script>
      (function() {
        const stored = localStorage.getItem('gitoprompt-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- SEO -->
    <title>GitoPrompt – Reverse Engineer Any GitHub Repo into an AI Prompt</title>
    <meta name="description" content="Paste any public GitHub repository and get the original AI prompt that could have built it. Powered by NVIDIA AI." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="GitoPrompt – Reverse Engineer Any GitHub Repo into an AI Prompt" />
    <meta property="og:description" content="Paste any public GitHub repository and get the original AI prompt that could have built it. Powered by NVIDIA AI." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gitoprompt.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
